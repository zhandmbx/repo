spring:
  application:
    name: xind-code-spring
  profiles:
    active: local
    # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/springai
    username: root
    password: 123456
  data:
    redis:
      host: localhost
      port: 6379
      password:
      ttl: 3600
server:
  port: 8123
  servlet:
    context-path: /api
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: org.example.xindcodespring.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn


